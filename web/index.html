<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>assets_gen — pipeline 3D</title>
  <link rel="stylesheet" href="/static/styles.css?v=3" />
  <script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
</head>
<body>
  <header>
    <h1>assets_gen</h1>
    <div class="header-right">
      <span id="server-pill" class="pill pill-stopped">serveur: …</span>
      <button id="btn-viewer" class="ghost">Visualiseur 3D</button>
      <button id="btn-settings" class="ghost">Réglages</button>
    </div>
  </header>

  <div id="activity-banner" class="banner" hidden></div>

  <main>
    <aside id="sidebar">
      <div class="row">
        <select id="project-select"></select>
        <button id="btn-new-project" title="Nouveau projet">+</button>
      </div>
      <div id="asset-list"></div>
      <form id="new-asset" class="card">
        <h3>Nouvel asset</h3>
        <input id="asset-name" placeholder="Nom (ex. crusher)" required />
        <select id="asset-examples"><option value="">💡 Exemples de prompt…</option></select>
        <textarea id="asset-desc" placeholder="Description (style, couleurs, forme…)"></textarea>
        <select id="asset-backend">
          <option value="auto">Backend: auto</option>
          <option value="v21">Hunyuan 2.1 (image unique)</option>
          <option value="mv2">Hunyuan 2mv (4 vues)</option>
        </select>
        <button type="submit">Créer l'asset</button>
      </form>
    </aside>

    <section id="detail">
      <div id="empty-detail" class="muted">Sélectionne ou crée un asset.</div>
      <div id="asset-detail" hidden></div>
    </section>
  </main>

  <!-- Modale réglages -->
  <div id="settings-modal" class="modal" hidden>
    <div class="modal-box">
      <h2>Réglages</h2>
      <label>Clé OpenAI <input id="cfg-key" type="password" placeholder="sk-… (laisser vide = .env)" /></label>
      <label>Modèle image <input id="cfg-model" /></label>
      <label>Qualité
        <select id="cfg-quality"><option>low</option><option>medium</option><option>high</option></select>
      </label>
      <div class="grid2">
        <label>Budget USD <input id="cfg-budget" type="number" step="0.5" /></label>
        <label>Coût estimé / image <input id="cfg-cost" type="number" step="0.001" /></label>
        <label>Timeout image (s) <input id="cfg-timeout" type="number" step="10" /></label>
        <label>Backend par défaut
          <select id="cfg-backend"><option value="v21">Hunyuan 2.1</option><option value="mv2">Hunyuan 2mv</option></select>
        </label>
      </div>

      <h3>Paramètres de génération 3D</h3>
      <div class="grid2">
        <label>Steps 2.1 <input id="g-steps_v21" type="number" step="1" /></label>
        <label>Steps 2mv <input id="g-steps_mv2" type="number" step="1" /></label>
        <label>Guidance scale <input id="g-guidance_scale" type="number" step="0.5" /></label>
        <label>Résolution octree <input id="g-octree_resolution" type="number" step="32" /></label>
        <label>Num chunks <input id="g-num_chunks" type="number" step="10000" /></label>
        <label>Plafond faces (2.1) <input id="g-face_count_v21" type="number" step="1000" /></label>
        <label>Faces cible (réduction) <input id="g-target_face_num" type="number" step="1000" /></label>
        <label class="check"><input id="g-texture" type="checkbox" /> Générer la texture</label>
      </div>

      <h3>Serveur Hunyuan</h3>
      <div class="row">
        <button id="srv-v21">Démarrer 2.1</button>
        <button id="srv-mv2">Démarrer 2mv</button>
        <button id="srv-stop" class="ghost">Arrêter</button>
      </div>
      <pre id="srv-log" class="log"></pre>

      <div class="row end">
        <button id="cfg-save">Enregistrer</button>
        <button id="cfg-close" class="ghost">Fermer</button>
      </div>
    </div>
  </div>

  <!-- Visualiseur 3D autonome -->
  <div id="viewer-modal" class="modal" hidden>
    <div class="modal-box wide">
      <h2>Visualiseur 3D</h2>
      <div id="drop-zone" class="drop">
        Glisse un fichier <b>.glb / .gltf</b> ici, ou
        <label class="linklike"><input id="viewer-file" type="file" accept=".glb,.gltf" hidden /> choisis un fichier</label>.
      </div>
      <model-viewer id="viewer-mv" camera-controls auto-rotate shadow-intensity="1" exposure="1"></model-viewer>
      <div class="row end"><button id="viewer-close" class="ghost">Fermer</button></div>
    </div>
  </div>

  <script src="/static/app.js?v=5"></script>
</body>
</html>
